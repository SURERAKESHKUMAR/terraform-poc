name: Release Angular Library to GitHub Packages

on:
  push:
    tags:
      - 'v*'   # Triggers when tag like v1.0.0 is pushed

concurrency:
  group: gpr-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ---------------------------------------
      # Checkout repository
      # ---------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------
      # Setup Node
      # ---------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---------------------------------------
      # Install dependencies
      # ---------------------------------------
      - name: Install dependencies
        run: npm ci

      # ---------------------------------------
      # Build Angular library
      # ---------------------------------------
      - name: Build Angular library
        run: npx ng build common-utilities

      # ---------------------------------------
      # Set version from Git tag
      # ---------------------------------------
      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Tag version detected: $TAG"

          cd dist/common-utilities
          npm version "$TAG" --no-git-tag-version

      # ---------------------------------------
      # Publish to GitHub Packages
      # ---------------------------------------
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist/common-utilities

          cat > .npmrc <<NPMRC
//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
always-auth=true
@surerakeshkumar:registry=https://npm.pkg.github.com
NPMRC

          echo "Publishing version: $(node -p "require('./package.json').version")"

          npm publish --access restricted
