name: Release NuGet Packages (Tag Based)

on:
  push:
    tags:
      - 'v*'   # triggers when tag like v1.2.0 is pushed

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  CONFIGURATION: "Release"
  OWNER: "SURERAKESHKUMAR"
  NUGET_SOURCE_URL: "https://nuget.pkg.github.com/SURERAKESHKUMAR/index.json"

concurrency:
  group: nuget-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------
      # Checkout full history (required for tags)
      # ---------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------
      # Setup .NET SDK
      # ---------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ---------------------------------------
      # Extract version from Git tag
      # ---------------------------------------
      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Version detected: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------------------------------------
      # Add GitHub Packages source
      # ---------------------------------------
      - name: Add GitHub Packages source
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source "${{ env.NUGET_SOURCE_URL }}" \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      # ---------------------------------------
      # Restore
      # ---------------------------------------
      - name: Restore
        run: dotnet restore

      # ---------------------------------------
      # Build
      # ---------------------------------------
      - name: Build
        run: dotnet build -c ${{ env.CONFIGURATION }} --no-restore

      # ---------------------------------------
      # Pack all library projects with tag version
      # ---------------------------------------
      - name: Pack
        run: |
          mkdir -p artifacts/nuget

          for proj in $(git ls-files '*.csproj'); do
            if grep -qi "<OutputType>Exe</OutputType>" "$proj"; then
              echo "Skipping executable project: $proj"
              continue
            fi

            echo "Packing $proj"

            dotnet pack "$proj" \
              -c ${{ env.CONFIGURATION }} \
              --no-build \
              /p:Version=${{ steps.version.outputs.version }} \
              /p:RepositoryUrl="https://github.com/${{ github.repository }}" \
              /p:RepositoryType="git" \
              -o artifacts/nuget
          done

      # ---------------------------------------
      # Publish to GitHub Packages
      # ---------------------------------------
      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in artifacts/nuget/*.nupkg; do
            echo "Publishing $pkg"
            dotnet nuget push "$pkg" \
              --api-key "$GITHUB_TOKEN" \
              --source "github" \
              --skip-duplicate
          done
